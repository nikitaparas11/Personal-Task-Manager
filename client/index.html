<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Task Manager</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Personal Task Manager</h1>
    <div class="counts" id="counts">0 active • 0 completed</div>
  </header>

  <main>

    <section class="controls">
      <form id="new-task-form">
        <input id="title" name="title" type="text" placeholder="Task title *" required />
        <input id="dueDate" name="dueDate" type="date" />
        <input id="description" name="description" type="text" placeholder="Description (optional)" />
        <button type="submit">Add Task</button>
      </form>

      <div class="filters">
        <button data-filter="all" class="filter active">All</button>
        <button data-filter="active" class="filter">Active</button>
        <button data-filter="completed" class="filter">Completed</button>
        <input id="search" type="search" placeholder="Search by title" />
      </div>
    </section>

    <section id="empty" class="empty hidden">
      No tasks yet. Add your first task 👇
    </section>

    <ul id="task-list" class="task-list" aria-live="polite"></ul>

  </main>

  <!-- Template -->
  <template id="task-item-template">
    <li class="task" draggable="true">
      <label>
        <input type="checkbox" class="toggle" />
        <span class="title"></span>
      </label>

      <div class="meta">
        <span class="due"></span>
        <span class="created"></span>
      </div>

      <div class="desc"></div>

      <div class="actions">
        <button class="edit">Edit</button>
        <button class="delete danger">Delete</button>
      </div>
    </li>
  </template>

  <!-- Edit Dialog -->
  <dialog id="edit-dialog">
    <form method="dialog" id="edit-form">
      <h3>Edit Task</h3>

      <input id="edit-title" type="text" required />
      <input id="edit-dueDate" type="date" />
      <textarea id="edit-description" rows="3" placeholder="Description"></textarea>

      <menu>
        <button value="cancel">Cancel</button>
        <button id="edit-save" value="default">Save</button>
      </menu>
    </form>
  </dialog>

  <script src="main.js"></script>

</body>
</html>
